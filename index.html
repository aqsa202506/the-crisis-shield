<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- 🛡️ ANTI-HACKER SECURITY FRAMEWORK -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https:;">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">

    <title>CRISIS SHIELD // AI Command Terminal v5.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #020617; --surface: #0f172a; --surface-light: #1e293b;
            --gold: #f59e0b; --blue: #3b82f6; --green: #10b981; --red: #ef4444;
            --text-main: #f8fafc; --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); padding-top: 60px; overflow-x: hidden; }
        
        /* 📈 LIVE MARQUEE TICKER */
        .ticker-bar {
            position: fixed; top: 0; left: 0; width: 100%; height: 45px;
            background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(59, 130, 246, 0.2);
            overflow: hidden; z-index: 9999; display: flex; align-items: center;
        }
        .ticker-track { display: flex; white-space: nowrap; animation: scroll 35s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .ticker-node { padding: 0 30px; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; font-weight: 700; }
        .up { color: var(--green); } .down { color: var(--red); }

        /* MAIN APP LAYOUT */
        .app-container { max-width: 1300px; margin: 20px auto; padding: 0 20px; }

        /* HERO HEADER */
        .hero-section { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; margin-bottom: 25px; gap: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 20px; }
        .hero-title h1 { font-weight: 800; font-size: 2.2rem; letter-spacing: -1px; background: linear-gradient(to right, #fff, #64748b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero-title p { color: var(--green); font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; margin-top: 4px; }
        
        .threat-meter { background: rgba(239, 68, 68, 0.08); border: 1px solid rgba(239, 68, 68, 0.25); padding: 12px 20px; border-radius: 14px; display: flex; align-items: center; gap: 12px; }
        .pulse { width: 10px; height: 10px; background: var(--red); border-radius: 50%; box-shadow: 0 0 10px var(--red); animation: ping 1.5s cubic-bezier(0, 0, 0.2, 1) infinite; }

        /* 🖥️ TWO-COLUMN MASTER GRID */
        .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 25px; margin-top: 20px; }
        @min-width 992px { .dashboard-grid { grid-template-columns: 380px 1fr; } }
        @media (min-width: 992px) { .dashboard-grid { grid-template-columns: 380px 1fr; } }

        /* LEFT SIDEBAR: CONTROLS & LIVE AGENT */
        .sidebar { display: flex; flex-direction: column; gap: 20px; }
        .control-panel { background: var(--surface); border: 1px solid rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        
        .tabs-vertical { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .tab-btn { width: 100%; padding: 14px; background: var(--surface-light); border: 1px solid rgba(255,255,255,0.03); color: var(--text-muted); border-radius: 12px; cursor: pointer; font-weight: 700; font-size: 0.9rem; display: flex; align-items: center; gap: 10px; transition: all 0.2s ease; }
        .tab-btn.active { background: var(--blue); color: #fff; box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }

        /* 🤖 LIVE AI AGENT TERMINAL (THE MAIN ATTRACTION) */
        .agent-terminal { background: #020617; border: 1px solid rgba(16, 185, 129, 0.3); border-radius: 20px; padding: 20px; font-family: 'JetBrains Mono', monospace; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); display: flex; flex-direction: column; gap: 12px; }
        .agent-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(16, 185, 129, 0.2); padding-bottom: 10px; font-size: 0.8rem; color: var(--green); font-weight: bold; }
        .agent-logs { height: 180px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; font-size: 0.75rem; color: #a7f3d0; scrollbar-width: none; }
        .agent-logs::-webkit-scrollbar { display: none; }
        
        /* RIGHT SIDEBAR: AI SEARCH & DATA CARDS */
        .main-content { display: flex; flex-direction: column; gap: 20px; }
        .search-box-wrapper { position: relative; width: 100%; }
        .ai-search-bar { width: 100%; padding: 18px 24px; padding-left: 55px; background: var(--surface); border: 1px solid rgba(59, 130, 246, 0.3); border-radius: 16px; color: #fff; font-size: 1rem; outline: none; transition: all 0.3s ease; }
        .ai-search-bar:focus { border-color: var(--gold); box-shadow: 0 0 20px rgba(245, 158, 11, 0.15); }
        .search-icon { position: absolute; left: 22px; top: 50%; transform: translateY(-50%); color: var(--blue); font-size: 1.2rem; }

        /* DATA MATRIX GRID */
        .matrix-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .intel-card { background: linear-gradient(145deg, var(--surface), #0b1329); border-radius: 18px; padding: 25px; border: 1px solid rgba(255,255,255,0.02); display: flex; flex-direction: column; justify-content: space-between; transition: all 0.3s ease; }
        .intel-card:hover { transform: translateY(-4px); border-color: rgba(245, 158, 11, 0.3); box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        
        .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .card-icon { width: 40px; height: 40px; background: rgba(245, 158, 11, 0.1); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: var(--gold); font-size: 1.1rem; }
        .intel-card h2 { font-size: 1.15rem; font-weight: 700; color: #fff; }
        .intel-card p { color: var(--text-muted); font-size: 0.9rem; line-height: 1.6; }
        
        .empty-state { grid-column: 1 / -1; text-align: center; padding: 50px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; background: var(--surface); border-radius: 18px; border: 1px dashed rgba(255,255,255,0.1); }
        .rtl { direction: rtl; text-align: right; }
        .rtl .search-icon { left: auto; right: 22px; }
        .rtl .ai-search-bar { padding-left: 24px; padding-right: 55px; }
    </style>
</head>
<body>

    <!-- 📈 LIVE TICKER -->
    <div class="ticker-bar">
        <div class="ticker-track" id="tickerTrack"></div>
    </div>

    <div class="app-container">
        
        <!-- HERO HEAD -->
        <div class="hero-section">
            <div class="hero-title">
                <h1>THE CRISIS SHIELD</h1>
                <p><i class="fa-solid fa-microchip"></i> AGENT INFRASTRUCTURE V5.0 // ONLINE</p>
            </div>
            <div class="threat-meter">
                <div class="pulse"></div>
                <div>
                    <span style="display: block; font-size: 0.65rem; color: #fca5a5; font-weight: 700;">THREAT ASSESSMENT</span>
                    <span style="color: var(--red); font-family: 'JetBrains Mono', monospace; font-weight: 800; font-size: 0.85rem;">ELEVATED VOLATILITY</span>
                </div>
            </div>
        </div>

        <!-- 🖥️ MAIN TWO-COLUMN DASHBOARD -->
        <div class="dashboard-grid">
            
            <!-- LEFT: CONTROLS & LIVE AGENT LOGS -->
            <div class="sidebar">
                <div class="control-panel">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                        <span style="font-family:'JetBrains Mono'; font-size:0.75rem; color:var(--blue); font-weight:700;">// SELECT MATRIX</span>
                        <select class="lang-select" id="langSelect" onchange="setLanguage(this.value)">
                            <option value="en">English (EN)</option>
                            <option value="hi">Hinglish (HI)</option>
                            <option value="ar">العربية (AR)</option>
                        </select>
                    </div>
                    <div class="tabs-vertical">
                        <button class="tab-btn active" id="tab-investor" onclick="setCategory('investor')"><i class="fa-solid fa-chart-pie"></i> Investor Matrix</button>
                        <button class="tab-btn" id="tab-business" onclick="setCategory('business')"><i class="fa-solid fa-briefcase"></i> Business Matrix</button>
                        <button class="tab-btn" id="tab-student" onclick="setCategory('student')"><i class="fa-solid fa-user-astronaut"></i> Student Shield</button>
                        <button class="tab-btn" id="tab-family" onclick="setCategory('family')"><i class="fa-solid fa-house-chimney"></i> Family Radar</button>
                    </div>
                </div>

                <!-- 🤖 LIVE AUTOMATION AGENT MONITOR -->
                <div class="agent-terminal">
                    <div class="agent-header">
                        <span><i class="fa-solid fa-robot"></i> SHIELD_AGENT_V8.0</span>
                        <span style="color: var(--blue);">[RUNNING]</span>
                    </div>
                    <div class="agent-logs" id="agentLogs">
                        <div>[SYSTEM] Initializing automation neural layers...</div>
                    </div>
                </div>
            </div>

            <!-- RIGHT: SEARCH & CONTENT CARDS -->
            <div class="main-content">
                <div class="search-box-wrapper">
                    <i class="fa-solid fa-terminal search-icon"></i>
                    <input type="text" class="ai-search-bar" id="searchBar" onkeyup="renderDashboard()" placeholder="Ask AI Matrix or scan system alerts...">
                </div>

                <div class="matrix-grid" id="matrixGrid"></div>
            </div>

        </div>
    </div>

    <script>
        let currentLanguage = 'en';
        let currentCategory = 'investor';

        // 🧠 DEEP CENTRAL DATA MATRIX
        const database = [
            {
                id: "investor", icon: "fa-solid fa-coins", keywords: "gold finance war market invest money inflation wealth crisis",
                title: { en: "Gold Strategy Radar", hi: "Gold Strategy Radar", ar: "رادار استراتيجية الذهب" },
                text: {
                    en: "High Inflation alert! Pivot 15% of active capital into safe-haven assets like Sovereign Gold Bonds.",
                    hi: "High Inflation alert! Currency girne se bachne ke liye apne capital ka 15% Sovereign Gold Bonds me invest karein.",
                    ar: "تنبيه تضخم مرتفع! تحويل 15٪ من رأس المال إلى أصول آمنة مثل سندات الذهب."
                }
            },
            {
                id: "investor", icon: "fa-brands fa-bitcoin", keywords: "crypto bitcoin ethereum market digital finance crisis",
                title: { en: "Crypto Volatility Matrix", hi: "Crypto Volatility Matrix", ar: "مصفوفة تقلبات التشفير" },
                text: {
                    en: "Bitcoin showing high correlation with tech equities. Avoid high-leverage trades during current geopolitical stress periods.",
                    hi: "Geopolitical tension ke chalte Bitcoin me uthal-puthal hai. Is waqt high-leverage trading se bachein.",
                    ar: "يظهر البيتكوين ارتباطًا كبيرًا. تجنب الصفقات عالية الرافعة المالية."
                }
            },
            {
                id: "investor", icon: "fa-solid fa-money-bill-trend-up", keywords: "stocks bonds equity mutual funds share market crisis",
                title: { en: "Equity Market Alert", hi: "Share Market Alert", ar: "تنبيه سوق الأسهم" },
                text: {
                    en: "Defense and energy sector stocks are projecting a 9% upward trajectory. Consider rebalancing portfolio exposure.",
                    hi: "Defense aur Energy sector ke shares me 9% tak ki tezi aane ki umeed hai. Portfolio ko rebalance karein.",
                    ar: "تتوقع أسهم قطاع الدفاع والطاقة مسارًا تصاعديًا بنسبة 9٪."
                }
            },
            {
                id: "business", icon: "fa-solid fa-truck-fast", keywords: "business startup trade supply chain export import market",
                title: { en: "Supply Chain Survival", hi: "Supply Chain Survival", ar: "بقاءسلسلة التوريد" },
                text: {
                    en: "Logistics disruptions detected. Protect working capital by securing long-term raw material contracts immediately.",
                    hi: "Logistics me rukawat aane ke sanket hain. Raw materials ke liye aaj hi long-term contracts secure kar lein.",
                    ar: "تم اكتشاف اضطرابات لوجستية. حماية رأس المال العامل عن طريق تأمين عقود المواد."
                }
            },
            {
                id: "business", icon: "fa-solid fa-file-invoice-dollar", keywords: "tax economy startup funding cashflow business crisis",
                title: { en: "Cashflow Shield", hi: "Cashflow Shield", ar: "درع التدفق النقدي" },
                text: {
                    en: "Credit markets are tightening. Businesses should maintain a minimum of 6 months operational cash reserves.",
                    hi: "Market me loan milna mushkil ho raha hai. Kam se kam 6 mahine ka operational cash reserve apne paas zaroor rakhein.",
                    ar: "أسواق الائتمان تتقلص. يجب على الشركات الحفاظ على احتياطيات نقدية."
                }
            },
            {
                id: "student", icon: "fa-solid fa-laptop-code", keywords: "job skill learning career tech artificial intelligence automation",
                title: { en: "AI Skill Shield", hi: "AI Skill Shield", ar: "درع مهارات الذكاء الاصطناعي" },
                text: {
                    en: "AI and automation vectors remain 84% immune to geopolitical crisis. Focus upskilling parameters on AI integrations.",
                    hi: "AI aur automation sectors crises me stable rehte hain. Future jobs secure karne ke liye AI tools aur integration sikhein.",
                    ar: "تظل قطاعات الذكاء الاصطناعي محصنة بنسبة 84٪. ركز على أدوات الذكاء الاصطناعي."
                }
            },
            {
                id: "student", icon: "fa-solid fa-globe", keywords: "remote work gig economy freelance job tech student crisis",
                title: { en: "Remote Economy Radar", hi: "Remote Economy Radar", ar: "رادار الاقتصاد عن بعد" },
                text: {
                    en: "Remote freelance gigs in web security and data analysis are surging. Build global portfolios to bypass local recessions.",
                    hi: "Web security aur data analysis me remote freelance jobs badh rahi hain. Local recession se bachne ke liye global clients banayein.",
                    ar: "تتزايد وظائف العمل المستقل عن بعد. بناء محافظ عالمية لتجاوز الركود."
                }
            },
            {
                id: "family", icon: "fa-solid fa-wheat-awn", keywords: "food grocery home budget basic storage crisis grain",
                title: { en: "Pantry Reserve Matrix", hi: "Ghar Ke Rashan Ka Radar", ar: "مصفوفة احتياطي المؤونة" },
                text: {
                    en: "Predictive analytics forecast a 12% escalation in core grain indexes. Pre-optimize backup pantry for a 45-day runway.",
                    hi: "Agle kuch dino me anaj aur rashan ke daam 12% tak badh sakte hain. Kam se kam 45 dino ka rashan reserve rakhein.",
                    ar: "تتوقع التحليلات التنبؤية ارتفاعًا في الحبوب. قم بتحسين مخزون المؤونة."
                }
            },
            {
                id: "family", icon: "fa-solid fa-gas-pump", keywords: "petrol expense oil fuel energy budget management crisis",
                title: { en: "Energy Cost Alert", hi: "Petrol/Energy Alert", ar: "تنبيه تكلفة الطاقة" },
                text: {
                    en: "Global logistical blockades will impact domestic fuel and electricity pricing. Optimize household energy consumption.",
                    hi: "International routes block hone se petrol aur bijli mehngi ho sakti hai. Apne ghar ke energy kharch ko control karein.",
                    ar: "ستؤثر الحصارات اللوجستية على أسعار الوقود. تحسين استهلاك الطاقة."
                }
            }
        ];

        // 🤖 SIMULATED LIVE AI AGENT LOGS
        const agentPhrases = [
            "Scanning global market matrices...",
            "Analyzing 'Gold Crisis' token clusters...",
            "AI Agent processing sentiment metrics: STABLE",
            "Shield firewall active against external injection vectors.",
            "Refreshing Bloomberg and CoinGecko API hooks...",
            "Automation logic running cross-tab filters...",
            "Alert generated: Inflation risk identified in Category [Family].",
            "Neural agent successfully synchronized with index grid."
        ];

        function runAgentTerminal() {
            const logsContainer = document.getElementById('agentLogs');
            setInterval(() => {
                const randomPhrase = agentPhrases[Math.floor(Math.random() * agentPhrases.length)];
                const timestamp = new Date().toLocaleTimeString();
                const logEntry = document.createElement('div');
                logEntry.innerHTML = `<span style="color: var(--gold)">[${timestamp}]</span> ${randomPhrase}`;
                logsContainer.appendChild(logEntry);
                logsContainer.scrollTop = logsContainer.scrollHeight;
                
                // Limit log size
                if (logsContainer.children.length > 20) {
                    logsContainer.removeChild(logsContainer.firstChild);
                }
            }, 3500);
        }

        // UI TICKER ANIMATION
        const tickersData = [
            { label: "GOLD (XAU/USD)", val: 2345.50, var: 2.0, sym: "$" },
            { label: "BRENT CRUDE", val: 82.30, var: 0.5, sym: "$" },
            { label: "USD/INR", val: 83.15, var: 0.05, sym: "₹" },
            { label: "BITCOIN (BTC)", val: 68400.00, var: 50.0, sym: "$" },
            { label: "NASDAQ 100", val: 18200.25, var: 15.0, sym: "" }
        ];

        function initTicker() {
            const track = document.getElementById('tickerTrack');
            let content = '';
            tickersData.forEach((t, i) => {
                content += `<div class="ticker-node"><span style="color:var(--gold);">${t.label}</span> ${t.sym}<span id="tick-${i}">${t.val.toFixed(2)}</span> <i id="tick-icon-${i}" class="fa-solid fa-caret-up up"></i></div>`;
            });
            track.innerHTML = content + content + content;
        }

        function cycleTickers() {
            tickersData.forEach((t, i) => {
                let el = document.getElementById(`tick-${i}`);
                if (!el) return;
                let current = parseFloat(el.innerText);
                let shift = (Math.random() * t.var) - (t.var / 2);
                el.innerText = (current + shift).toFixed(2);
                let icon = document.getElementById(`tick-icon-${i}`);
                if(icon) icon.className = shift > 0 ? "fa-solid fa-caret-up up" : "fa-solid fa-caret-down down";
            });
        }

        function setCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${cat}`).classList.add('active');
            document.getElementById('searchBar').value = '';
            renderDashboard();
        }

        function setLanguage(lang) {
            currentLanguage = lang;
            if(lang === 'ar') document.body.classList.add('rtl');
            else document.body.classList.remove('rtl');
            
            const placeholders = { en: "Ask AI Matrix or scan system alerts...", hi: "AI Agent se poochein (e.g. gold, job)...", ar: "ابحث عن الأصول أو الأعمال..." };
            document.getElementById('searchBar').placeholder = placeholders[lang];
            renderDashboard();
        }

        function renderDashboard() {
            const grid = document.getElementById('matrixGrid');
            let rawInput = document.getElementById('searchBar').value.toLowerCase().replace(/[^a-z0-9 ]/g, "");
            let searchWords = rawInput.split(" ").filter(w => w.trim() !== ""); 
            let htmlPayload = '';

            let filtered = database.filter(item => {
                if (searchWords.length > 0) {
                    return searchWords.some(word => item.keywords.includes(word));
                } else {
                    return item.id === currentCategory;
                }
            });

            if (filtered.length === 0) {
                htmlPayload = `<div class="empty-state">// NO CRISIS INTEL MATCHES YOUR COMMAND SEARCH KEYWORD</div>`;
            } else {
                filtered.forEach(item => {
                    htmlPayload += `
                        <div class="intel-card">
                            <div>
                                <div class="card-header">
                                    <div class="card-icon"><i class="${item.icon}"></i></div>
                                    <h2>${item.title[currentLanguage]}</h2>
                                </div>
                                <p>${item.text[currentLanguage]}</p>
                            </div>
                        </div>
                    `;
                });
            }
            grid.innerHTML = htmlPayload;
        }

        window.onload = function() {
            initTicker();
            setInterval(cycleTickers, 2500);
            runAgentTerminal();
            setLanguage('en');
        };
    </script>
</body>
</html>
